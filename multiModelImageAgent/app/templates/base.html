<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MultiModel Image Agent{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .message-user { background: #3b82f6; color: white; }
        .message-assistant { background: #e5e7eb; color: #1f2937; }
        .message-loading { background: #fef3c7; color: #92400e; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-gray-800">MultiModel Agent</a>
                    <div class="ml-10 flex space-x-4">
                        <a href="/chat" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 {% if request.url.path == '/chat' %}text-blue-600{% endif %}">Chat</a>
                        <a href="/admin/models" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 {% if '/admin' in request.url.path %}text-blue-600{% endif %}">Models</a>
                        <a href="/tasks" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 {% if request.url.path == '/tasks' %}text-blue-600{% endif %}">Tasks</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
