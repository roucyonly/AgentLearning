{% extends "base.html" %}

{% block title %}任务管理 - MultiModel Agent{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-6">任务管理</h1>

    <!-- 筛选 -->
    <div class="flex gap-4 mb-6">
        <select id="status-filter" onchange="loadTasks()" class="border rounded-lg px-4 py-2">
            <option value="">所有状态</option>
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="completed">已完成</option>
            <option value="failed">失败</option>
        </select>
        <button onclick="loadTasks()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
            刷新
        </button>
    </div>

    <!-- 任务列表 -->
    <div id="tasks-list" class="space-y-4">
        <div class="text-center py-8 text-gray-500">加载中...</div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="mt-6 flex justify-center gap-2"></div>
</div>

<!-- 任务详情模态框 -->
<div id="task-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-xl">
        <h2 class="text-xl font-bold mb-4">任务详情</h2>
        <div id="task-detail" class="space-y-3"></div>
        <div class="mt-6 flex justify-end">
            <button onclick="hideTaskModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-100">关闭</button>
        </div>
    </div>
</div>

<script>
let currentPage = 1;

async function loadTasks(page = 1) {
    currentPage = page;
    const status = document.getElementById('status-filter').value;

    try {
        const params = new URLSearchParams({ skip: (page - 1) * 20, limit: 20 });
        if (status) params.append('status', status);

        const response = await fetch(`/api/v1/tasks/?${params}`);
        const text = await response.text();

        // 简单解析
        try {
            const tasks = JSON.parse(text);
            renderTasks(Array.isArray(tasks) ? tasks : []);
        } catch {
            document.getElementById('tasks-list').innerHTML = '<div class="text-gray-500">暂无任务</div>';
        }
    } catch (error) {
        document.getElementById('tasks-list').innerHTML = '<div class="text-red-500">加载失败: ' + error.message + '</div>';
    }
}

function renderTasks(tasks) {
    const container = document.getElementById('tasks-list');

    if (tasks.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-500">暂无任务</div>';
        return;
    }

    const statusColors = {
        'pending': 'bg-yellow-100 text-yellow-800',
        'processing': 'bg-blue-100 text-blue-800',
        'completed': 'bg-green-100 text-green-800',
        'failed': 'bg-red-100 text-red-800'
    };

    container.innerHTML = tasks.map(task => `
        <div class="border rounded-lg p-4 hover:shadow-md transition cursor-pointer" onclick="showTaskDetail('${task.id}')">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-medium">任务 ${task.id.slice(0, 8)}...</h3>
                    <p class="text-sm text-gray-500">类型: ${task.type} | 提供商: ${task.provider_id || '未知'}</p>
                </div>
                <span class="px-2 py-1 text-xs rounded ${statusColors[task.status] || 'bg-gray-100'}">
                    ${task.status}
                </span>
            </div>
            <div class="mt-2 text-sm text-gray-600">
                <p>创建时间: ${new Date(task.created_at).toLocaleString()}</p>
                ${task.error_message ? `<p class="text-red-500">错误: ${task.error_message}</p>` : ''}
            </div>
            ${task.output && task.output.url ? `
            <div class="mt-3">
                <img src="${task.output.url}" class="max-w-xs rounded" alt="结果">
            </div>
            ` : ''}
        </div>
    `).join('');
}

async function showTaskDetail(id) {
    try {
        const response = await fetch(`/api/v1/tasks/${id}`);
        const task = await response.json();

        document.getElementById('task-detail').innerHTML = `
            <div><strong>ID:</strong> ${task.id}</div>
            <div><strong>类型:</strong> ${task.type}</div>
            <div><strong>状态:</strong> ${task.status}</div>
            <div><strong>创建时间:</strong> ${new Date(task.created_at).toLocaleString()}</div>
            <div><strong>输入参数:</strong> <pre class="bg-gray-100 p-2 rounded text-sm mt-1">${JSON.stringify(task.input_params, null, 2)}</pre></div>
            ${task.output ? `<div><strong>输出:</strong> <pre class="bg-gray-100 p-2 rounded text-sm mt-1">${JSON.stringify(task.output, null, 2)}</pre></div>` : ''}
            ${task.error_message ? `<div class="text-red-500"><strong>错误:</strong> ${task.error_message}</div>` : ''}
            ${task.output && task.output.url ? `<div class="mt-2"><img src="${task.output.url}" class="max-w-full rounded"></div>` : ''}
        `;

        document.getElementById('task-modal').classList.remove('hidden');
        document.getElementById('task-modal').classList.add('flex');
    } catch (error) {
        alert('加载失败: ' + error.message);
    }
}

function hideTaskModal() {
    document.getElementById('task-modal').classList.add('hidden');
    document.getElementById('task-modal').classList.remove('flex');
}

// 页面加载时获取任务
loadTasks();
</script>
{% endblock %}
